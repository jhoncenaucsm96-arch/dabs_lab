# The main pipeline for batch8_dabs

resources:
  pipelines:
    batch8_dabs_etl:
      name: batch8_dabs_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/batch8_dabs_etl"

      libraries:
        - glob:
            include: ../src/batch8_dabs_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
